<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From</title>
</head>
<body>
    <form action="">
        <label for="">Enter Your Name</label>
        <input type="text" placeholder="Enter your name">
        <br>
        <label for="">Enter Your Email</label>
        <input type="email" placeholder="Enter your email">
        <br>
        <label for="">Enter Your Password</label>
        <input type="password" placeholder="Enter your Password">
        <br>
        <label for="">Enter Your Date</label>
        <input type="date">
        <br>
        <label for="">Enter Your File</label>
        <input type="file">
        <br>
        <label for="">Enter Your Number</label>
        <input type="number" placeholder="enter your number">

<br>
        <label for="">Enter your Skills</label>
        <input type="checkbox"> Html
        <input type="checkbox"> Css
        <input type="checkbox"> Java script

        <br>
        <label for="">Enter your gender</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other

        <br>
        <!-- Dropdown  -->
         <label for="">select brand</label>
        <select name="" id="">
            <option value="samsung">samsung</option>
            <option value="oneplus">oneplus</option>
            <option value="infinix">infinix</option>
            <option value="apple">apple</option>
        </select>
        <br>

        <label for="">Enter your detail</label>
        <textarea name="" id="" placeholder="enter your detail" rows="10" cols="20"></textarea>
<br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
