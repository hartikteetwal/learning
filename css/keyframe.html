<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyframe</title>
    <style>
        .container{
            width: 700px;
            height: 500px;
            border: 2px solid gray;
        }
        .box{
            width: 50px;
            height: 50px;
            background-color: red;
            animation: fahaa 10s linear infinite;
        }

        /* @keyframes fahaa {
            from{
                transform: translate(0px);
            }
            to{
                transform: translate(650px);
            }
        } */

        @keyframes fahaa {
            0%{
                transform: translate(0px,0px);
            }
            25%{
                transform: translate(650px,0px);
            }
            50%{
                transform: translate(650px,450px);
                
            }
            75%{
                transform: translate(0px,450px);
            }
            100%{
                transform: translate(0px,0px);

            }

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        </div>
</body>
</html>
