<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            font-size: 18px;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
        .container{
            width: 100vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgb(233, 226, 226);
            padding: 2px;
        }

        .right{
            display: flex;
            gap: 20px;
            padding-right: 40px;
        }
        .left{
            padding-left: 40px;
        }
        .right div{
            cursor: pointer;
        }

          .right img{
                display: none;
            }

        @media (max-width:600px) {
            .right div{
                display: none;
            }

          .right img{
            display: block;
          }
        }

        



    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="../html/2.png" alt="">
        </div>
        <div class="right">
        <div>Home</div>
        <div>About</div>
        <div>Contact</div>
        <img src="./menu.svg" alt="">
        </div>
    </div>
</body>
</html>
