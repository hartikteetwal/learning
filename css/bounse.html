<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .container{
            height: 500px;
            width: 100%;
            border-bottom: 2px solid black;
        }
        .ball{
            width: 50px;
            height: 50px;
            border-radius: 100%;background: red;
            position: absolute;
            bottom: 28.9%;
            animation: bounce 10s linear infinite;
        }

        @keyframes bounce {
            0%{
                /* transform: translate(0px,0px); */
            bottom: 28.9%;
            left: 0;
            }
            20%{
                /* transform: translate(70px,-200px); */
            bottom: 70%;
            left: 300px;
            }
            40%{
                /* transform: translate(70px,-200px); */
            bottom: 28.9%;
            left: 600px;
            }
            60%{
 bottom: 70%;
            left: 900px;
            }
            80%{
                 bottom: 28.9%;
            left: 1200px;
            }
                 100%{
 bottom: 70%;
            left: 1500px;
            }
        }

    </style>
</head>
<body>
    <div class="container">
<div class="ball"></div>
    </div>
</body>
</html>
