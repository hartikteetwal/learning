<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border: 2px solid black;
            height: 150px;
            width: 500px;
            display: grid;
            grid-template-columns: auto auto auto;
            /* gap: 4px; */
            justify-content: space-around;
            /* justify-content: space-between;
            justify-content: center;
            justify-content: space-evenly; */
            align-items: center;
        }
        .box{
            height: 50px;
            width: 50px;
            border: 2px solid black;
            display: grid;
            justify-content: center;
            align-items: center;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

</body>
</html>
